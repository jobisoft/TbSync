<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <script src="options.mjs" type="module"></script>
  <style>
    :root {
      color-scheme: light dark;
    }

    body {
      font-family: system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
      margin: 0;
    }

    p {
      margin: 0 0 14px;
      line-height: 1.5;
    }

    .options-button {
      padding: 8px 18px;
      background: #2a7fd4;
      color: #fff;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
    }

    .options-button:hover {
      background: #1a6abf;
    }

    @media (prefers-color-scheme: dark) {
      .options-button {
        background: #1a6abf;
      }

      .options-button:hover {
        background: #2a7fd4;
      }
    }
  </style>
</head>

<body>
  <p id="intro"></p>
  <div style="text-align:center">
    <button class="options-button" id="open-manager"></button>
  </div>
</body>

</html>
